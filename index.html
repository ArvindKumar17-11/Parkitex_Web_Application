<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Parkitx</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="admin-container">
        <header>
            <h1>Parkitx Admin Dashboard</h1>
            <div class="slots-info">
                Available Slots: <span id="availableSlots">-</span> / <span id="totalSlots">-</span>
            </div>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('booking-space')">Booking Space</button>
            <button class="tab-btn" onclick="showTab('bookings')">Bookings</button>
        </div>

        <div id="booking-space" class="tab-content active">
            <h2>Booking Space</h2>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Vehicle Number</th>
                        <th>Location</th>
                        <th>Place</th>
                        <th>Vehicle Type</th>
                        <th>Start Time</th>
                        <th>End Time</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="booking-space-table">
                    <!-- Data will be populated here -->
                </tbody>
            </table>
        </div>

        <div id="bookings" class="tab-content">
            <h2>Bookings</h2>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Vehicle Number</th>
                        <th>Location</th>
                        <th>Place</th>
                        <th>Vehicle Type</th>
                        <th>Start Time</th>
                        <th>End Time</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="bookings-table">
                    <!-- Data will be populated here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Check authentication
        if (!localStorage.getItem('adminToken')) {
            window.location.href = 'login.html';
        }

        // Show active tab
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(tabId).classList.add('active');
            document.querySelector(`[onclick="showTab('${tabId}')"]`).classList.add('active');
        }

        // Fetch and display data
        async function fetchData() {
            try {
                const token = localStorage.getItem('adminToken');
                const [bookingSpaceRes, bookingsRes] = await Promise.all([
                    fetch('http://localhost:3000/api/admin/booking-space', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    }),
                    fetch('http://localhost:3000/api/admin/bookings', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    })
                ]);

                const bookingSpaceData = await bookingSpaceRes.json();
                const bookingsData = await bookingsRes.json();

                if (bookingSpaceData.success) {
                    displayBookings(bookingSpaceData.data, 'booking-space-table');
                }
                if (bookingsData.success) {
                    displayBookings(bookingsData.data, 'bookings-table');
                }
            } catch (error) {
                console.error('Error fetching data:', error);
                alert('Error fetching data. Please try again.');
            }
        }

        // Display bookings in table
        function displayBookings(bookings, tableId) {
            const tbody = document.getElementById(tableId);
            tbody.innerHTML = '';

            bookings.forEach(booking => {
                const tr = document.createElement('tr');
                tr.setAttribute('data-booking-id', booking._id);
                tr.innerHTML = `
                    <td>${booking.name}</td>
                    <td>${booking.phoneNumber}</td>
                    <td>${booking.vehicleNumber}</td>
                    <td>${booking.location}</td>
                    <td>${booking.place}</td>
                    <td>${booking.vehicleType}</td>
                    <td>${new Date(booking.startTime).toLocaleString()}</td>
                    <td>${new Date(booking.endTime).toLocaleString()}</td>
                    <td>${booking.status || 'Pending'}</td>
                    <td>
                        <button onclick="updateStatus('${booking._id}', 'Entered')" 
                                class="status-btn">
                            Mark as Entered
                        </button>
                        <button onclick="updateStatus('${booking._id}', 'Removed')" 
                                class="remove-btn">
                            Remove
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Update booking status
        async function updateStatus(bookingId, status) {
            try {
                const token = localStorage.getItem('adminToken');
                const response = await fetch(`http://localhost:3000/api/admin/update-status/${bookingId}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status })
                });

                const data = await response.json();

                if (data.success) {
                    if (status === 'Removed') {
                        // Remove the booking from the table
                        const row = document.querySelector(`tr[data-booking-id="${bookingId}"]`);
                        if (row) {
                            row.remove();
                        }
                        // Update available slots display
                        document.getElementById('availableSlots').textContent = data.availableSlots;
                        alert('Booking removed successfully');
                    } else {
                        // Update the status in the table
                        const statusCell = document.querySelector(`tr[data-booking-id="${bookingId}"] td:nth-last-child(2)`);
                        if (statusCell) {
                            statusCell.textContent = status;
                        }
                        alert('Status updated successfully');
                    }
                } else {
                    alert('Error: ' + (data.error || 'Failed to update status'));
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error updating status. Please try again.');
            }
        }

        // Fetch slots data
        async function fetchSlots() {
            try {
                const response = await fetch('http://localhost:3000/api/check-slots');
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('availableSlots').textContent = data.availableSlots;
                    document.getElementById('totalSlots').textContent = data.totalSlots;
                }
            } catch (error) {
                console.error('Error fetching slots:', error);
            }
        }

        // Logout function
        function logout() {
            localStorage.removeItem('adminToken');
            window.location.href = 'login.html';
        }

        // Initial data fetch
        fetchData();
        fetchSlots();
    </script>
</body>
</html>
